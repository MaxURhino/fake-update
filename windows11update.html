<!DOCTYPE html>
<html>
    <head>
        <title>Fake Update - Windows 11</title>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <span class="update-modifier"></span>
        <div class="update">
            <div class="update-contents windows-update-contents">
                <div class="update-icon">
                    <span class="windows-update-icon"></span>
                </div>
                <div class="update-text">
                    <p class="update-text-line windows-update-text-line">You're <span class="update-text-line-percent"></span> there.</p>
                    <p class="update-text-line windows-update-text-line">Please keep your computer on.</p>
                </div>
            </div>
        </div>
        <script src="./script.js"></script>
    </body>
</html>
